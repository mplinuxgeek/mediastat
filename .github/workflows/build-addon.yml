name: Build & publish HA add-on

on:
  push:
    tags:
      - "v*"          # trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # allow manual runs from the GitHub Actions UI

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/mediastat-addon

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base-debian:trixie

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Sync app sources into ha-addon/
        run: |
          cp main.py requirements.txt ha-addon/
          cp -r templates ha-addon/templates

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          # Strip leading 'v' from tag (v1.0.0 → 1.0.0)
          VERSION="${GITHUB_REF_NAME#v}"
          # Fall back to 'dev' for manual/branch runs
          VERSION="${VERSION:-dev}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6.15.0
        with:
          context: ha-addon
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          tags: |
            ${{ env.IMAGE_BASE }}-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_BASE }}-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  # Update the version field in ha-addon/config.yaml to match the tag,
  # then commit it back so HA shows the correct version in the UI.
  update-version:
    name: Bump version in config.yaml
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in ha-addon/config.yaml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version: .*/version: \"${VERSION}\"/" ha-addon/config.yaml

      - name: Commit updated config.yaml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ha-addon/config.yaml
          if git diff --cached --quiet; then
            echo "No version change to commit"
            exit 0
          fi
          git commit -m "chore: bump add-on version to ${GITHUB_REF_NAME#v}"
          git pull --rebase origin main
          git push origin HEAD:main
