<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMDb Scan — MediaStat</title>
    <style>
        :root {
            --bg:       #0d1117;
            --surface:  #161b22;
            --surface2: #1c2128;
            --border:   #30363d;
            --text:     #e6edf3;
            --muted:    #7d8590;
            --accent:   #58a6ff;
            --green:    #3fb950;
            --yellow:   #d29922;
            --red:      #f47474;
            --gold:     #f5c518;

            --fs-xs:   15px;
            --fs-sm:   16px;
            --fs-base: 17px;
            --fs-md:   18px;
            --fs-lg:   20px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: ui-monospace, 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: var(--fs-base); line-height: 1.5; min-height: 100vh;
        }
        header {
            position: sticky; top: 0; z-index: 10;
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 10px 20px; display: flex; align-items: center; gap: 16px;
        }
        .back-link { color: var(--muted); text-decoration: none; font-size: var(--fs-sm); transition: color 0.1s; }
        .back-link:hover { color: var(--accent); }
        .page-title { color: var(--text); font-size: var(--fs-md); font-weight: 600; }

        main { padding: 20px; max-width: 960px; }

        /* ── Settings panel ── */
        .settings-panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; margin-bottom: 16px; overflow: hidden;
        }
        .settings-panel summary {
            padding: 10px 14px; cursor: pointer; list-style: none;
            display: flex; align-items: center; gap: 8px;
            font-size: var(--fs-sm); color: var(--muted);
            user-select: none;
        }
        .settings-panel summary::-webkit-details-marker { display: none; }
        .settings-panel[open] summary { border-bottom: 1px solid var(--border); }
        .si-chevron { font-size: 10px; transition: transform 0.2s; }
        .settings-panel[open] .si-chevron { transform: rotate(90deg); }
        .settings-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
        .setting-row { display: flex; align-items: center; gap: 10px; font-size: var(--fs-sm); }
        .setting-row label { display: flex; align-items: center; gap: 7px; cursor: pointer; }
        .setting-note { color: var(--muted); font-size: var(--fs-xs); }

        /* ── Job panel ── */
        .job-panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 16px; margin-bottom: 16px;
        }
        .job-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .btn {
            background: transparent; border: 1px solid var(--border); color: var(--muted);
            cursor: pointer; font-family: inherit; font-size: var(--fs-sm);
            padding: 5px 14px; border-radius: 5px; transition: border-color 0.1s, color 0.1s;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn:disabled { opacity: 0.4; cursor: default; pointer-events: none; }
        .btn.danger:hover { border-color: var(--red); color: var(--red); }
        .btn.primary { color: var(--accent); border-color: #1a3a5c; }
        .btn.primary:hover { background: rgba(88,166,255,0.08); }

        .phase-badge {
            font-size: var(--fs-xs); font-weight: 700; letter-spacing: 0.5px;
            padding: 2px 8px; border-radius: 3px; text-transform: uppercase;
        }
        .phase-idle    { background: var(--surface2); color: var(--muted); }
        .phase-running { background: #1a2f4a; color: var(--accent); }
        .phase-done    { background: #1a3a24; color: var(--green); }
        .phase-error   { background: #3a1a1a; color: var(--red); }

        .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .bar { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s; }
        .bar-pct { font-size: var(--fs-sm); color: var(--muted); width: 44px; text-align: right; }

        .job-stats { display: flex; gap: 20px; flex-wrap: wrap; font-size: var(--fs-sm); color: var(--muted); }
        .job-stats .sv { color: var(--text); }
        .job-stats .sv.green { color: var(--green); }
        .job-stats .sv.yellow { color: var(--yellow); }
        .job-stats .sv.red { color: var(--red); }
        .job-error { color: var(--red); font-size: var(--fs-sm); margin-top: 8px; }

        /* ── Review section ── */
        .review-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .review-title { font-size: var(--fs-md); font-weight: 600; }
        .review-count { font-size: var(--fs-sm); color: var(--muted); }

        .review-item {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px 14px; margin-bottom: 10px;
        }
        .review-item.resolved { opacity: 0.4; }
        .review-filename { font-size: var(--fs-sm); color: var(--text); margin-bottom: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .review-reason { font-size: var(--fs-xs); color: var(--muted); margin-bottom: 8px; }
        .review-results { display: flex; flex-wrap: wrap; gap: 6px; }
        .result-btn {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); cursor: pointer; font-family: inherit;
            font-size: var(--fs-xs); padding: 4px 10px; border-radius: 4px;
            text-align: left; transition: border-color 0.1s;
            display: flex; flex-direction: column; gap: 1px;
        }
        .result-btn:hover { border-color: var(--accent); }
        .result-btn.selected { border-color: var(--green); color: var(--green); }
        .result-title { font-weight: 600; }
        .result-meta { color: var(--muted); }
        .result-rating { color: var(--gold); }
        .skip-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--muted); cursor: pointer; font-family: inherit;
            font-size: var(--fs-xs); padding: 4px 10px; border-radius: 4px;
        }
        .skip-btn:hover { border-color: var(--red); color: var(--red); }

        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
        .phase-running { animation: pulse 2s ease-in-out infinite; }
    </style>
</head>
<body>
<header>
    <a href="{{ ingress_path }}/" class="back-link">← Back</a>
    <span class="page-title">IMDb Scan</span>
</header>

<main>
    <!-- Settings -->
    <details class="settings-panel" id="settings-panel" open>
        <summary>
            <span class="si-chevron">&#9654;</span>
            Settings
        </summary>
        <div class="settings-body">
            <div class="setting-row">
                <label>
                    <input type="checkbox" id="opt-force-rescan">
                    Force rescan
                </label>
                <span class="setting-note">Re-match files that already have an IMDb match</span>
            </div>
            <div class="setting-row">
                <label>
                    <input type="checkbox" id="opt-skip-manual" checked>
                    Skip ambiguous
                </label>
                <span class="setting-note">Uncheck to collect ambiguous files in the Review section below</span>
            </div>
        </div>
    </details>

    <!-- Job panel -->
    <div class="job-panel">
        <div class="job-controls">
            <button class="btn primary" id="run-btn" onclick="startScan()">▶ Run</button>
            <button class="btn danger" id="stop-btn" onclick="stopScan()" style="display:none">■ Stop</button>
            <span class="phase-badge phase-idle" id="phase-badge">Idle</span>
        </div>
        <div class="bar-row">
            <div class="bar"><div class="bar-fill" id="bar-fill" style="width:0"></div></div>
            <span class="bar-pct" id="bar-pct">—</span>
        </div>
        <div class="job-stats" id="job-stats" style="display:none">
            <span>Searched <span class="sv" id="stat-searched">0</span> / <span class="sv" id="stat-total">0</span></span>
            <span>Auto <span class="sv green" id="stat-auto">0</span></span>
            <span>Skipped <span class="sv" id="stat-skipped">0</span></span>
            <span>No result <span class="sv" id="stat-none">0</span></span>
            <span id="stat-review-wrap" style="display:none">Review <span class="sv yellow" id="stat-review">0</span></span>
        </div>
        <div class="job-error" id="job-error" style="display:none"></div>
    </div>

    <!-- Review section -->
    <div id="review-section" style="display:none">
        <div class="review-header">
            <span class="review-title">Needs Review</span>
            <span class="review-count" id="review-count"></span>
        </div>
        <div id="review-list"></div>
    </div>
</main>

<script>
const BASE_PATH    = "{{ ingress_path }}";
const DELETE_TOKEN = "{{ delete_token }}";
const TMDB_CONFIGURED = {{ 'true' if tmdb_configured else 'false' }};
let _scanEs = null;
let _running = false;

function _applyProgress(p) {
    const phase = p.phase || 'idle';
    const total = p.total || 0;
    const searched = p.searched || 0;
    const pct = total > 0 ? Math.round((searched / total) * 100) : (phase === 'done' ? 100 : 0);

    const badge = document.getElementById('phase-badge');
    badge.textContent = phase === 'matching' ? 'Matching' : phase.charAt(0).toUpperCase() + phase.slice(1);
    badge.className = 'phase-badge phase-' + (phase === 'matching' ? 'running' : phase);

    document.getElementById('bar-fill').style.width = pct + '%';
    document.getElementById('bar-pct').textContent  = phase === 'idle' ? '—' : pct + '%';

    const statsEl = document.getElementById('job-stats');
    statsEl.style.display = phase === 'idle' ? 'none' : '';
    document.getElementById('stat-searched').textContent = searched;
    document.getElementById('stat-total').textContent    = total;
    document.getElementById('stat-auto').textContent     = p.auto || 0;
    document.getElementById('stat-skipped').textContent  = p.skipped || 0;
    document.getElementById('stat-none').textContent     = p.none || 0;

    const reviewCount = p.review_count || 0;
    document.getElementById('stat-review-wrap').style.display = reviewCount > 0 ? '' : 'none';
    document.getElementById('stat-review').textContent = reviewCount;

    const errEl = document.getElementById('job-error');
    if (phase === 'error') { errEl.style.display=''; errEl.textContent = 'Error: ' + (p.error||'?'); }
    else errEl.style.display = 'none';

    const running = phase === 'running' || phase === 'searching' || phase === 'matching';
    _running = running;
    document.getElementById('run-btn').disabled  = running;
    document.getElementById('stop-btn').style.display = running ? '' : 'none';
    document.getElementById('run-btn').style.display  = running ? 'none' : '';
}

async function startScan() {
    if (_scanEs) { _scanEs.close(); _scanEs = null; }
    const body = {
        force_rescan: document.getElementById('opt-force-rescan').checked,
        skip_manual:  document.getElementById('opt-skip-manual').checked,
    };
    const r = await fetch(BASE_PATH + '/imdb/scan-bg', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Delete-Token': DELETE_TOKEN },
        body: JSON.stringify(body),
    });
    const j = await r.json();
    if (j.error) { alert(j.error); return; }
    document.getElementById('review-section').style.display = 'none';
    document.getElementById('review-list').innerHTML = '';
    listenScan();
}

function stopScan() {
    if (_scanEs) { _scanEs.close(); _scanEs = null; }
    _running = false;
    document.getElementById('run-btn').style.display  = '';
    document.getElementById('stop-btn').style.display = 'none';
}

function listenScan() {
    _scanEs = new EventSource(BASE_PATH + '/imdb/scan-progress');
    _scanEs.onmessage = e => {
        const p = JSON.parse(e.data);
        _applyProgress(p);
        if (p.phase === 'done') {
            _scanEs.close(); _scanEs = null;
            loadReview();
        } else if (p.phase === 'error') {
            _scanEs.close(); _scanEs = null;
        }
    };
}

async function loadReview() {
    const r = await fetch(BASE_PATH + '/imdb/scan-review');
    if (!r.ok) return;
    const items = await r.json();
    if (!items.length) return;
    const list = document.getElementById('review-list');
    list.innerHTML = '';
    document.getElementById('review-count').textContent = items.length + ' file' + (items.length===1?'':'s');
    document.getElementById('review-section').style.display = '';
    for (const item of items) renderReviewItem(item, list);
}

function renderReviewItem(item, container) {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.dataset.path = item.path;

    const resultsHtml = (item.results || []).map(r => {
        const rating = r.average_rating ? `<span class="result-rating">★${r.average_rating}</span>` : '';
        const meta   = [r.start_year, r.runtime_minutes ? r.runtime_minutes+'m' : null, r.title_type]
                          .filter(Boolean).join(' · ');
        return `<button class="result-btn" data-tconst="${r.tconst}"
                    data-title="${esc(r.primary_title)}" data-year="${r.start_year||''}"
                    data-genres="${esc(r.genres||'')}" data-runtime="${r.runtime_minutes||''}"
                    data-rating="${r.average_rating||''}"
                    onclick="selectMatch(this)"
                  ><span class="result-title">${esc(r.primary_title)}</span
                  ><span class="result-meta">${esc(meta)} ${rating}</span></button>`;
    }).join('');

    div.innerHTML = `
        <div class="review-filename" title="${esc(item.path)}">${esc(item.filename)}</div>
        <div class="review-reason">${esc(item.reason)}</div>
        <div class="review-results">
            ${resultsHtml}
            <button class="skip-btn" onclick="skipReview(this)">Skip</button>
        </div>`;
    container.appendChild(div);
}

function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function selectMatch(btn) {
    const item = btn.closest('.review-item');
    const path = item.dataset.path;
    item.querySelectorAll('.result-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');

    await fetch(BASE_PATH + '/imdb/match', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Delete-Token': DELETE_TOKEN },
        body: JSON.stringify({
            path,
            tconst:          btn.dataset.tconst,
            primary_title:   btn.dataset.title,
            start_year:      btn.dataset.year ? parseInt(btn.dataset.year) : null,
            genres:          btn.dataset.genres || null,
            runtime_minutes: btn.dataset.runtime ? parseInt(btn.dataset.runtime) : null,
            average_rating:  btn.dataset.rating ? parseFloat(btn.dataset.rating) : null,
            embed_meta: false,
            source: 'imdb',
        }),
    });
    item.classList.add('resolved');
    setTimeout(() => item.remove(), 800);
}

function skipReview(btn) {
    const item = btn.closest('.review-item');
    item.classList.add('resolved');
    setTimeout(() => item.remove(), 400);
}

// On load: restore status
(async () => {
    try {
        const r = await fetch(BASE_PATH + '/imdb/scan-status');
        if (r.ok) {
            const p = await r.json();
            _applyProgress(p);
            if (p.phase === 'running' || p.phase === 'searching' || p.phase === 'matching') {
                listenScan();
            } else if (p.phase === 'done' && (p.review_count||0) > 0) {
                loadReview();
            }
        }
    } catch (_) {}
})();
</script>
</body>
</html>
